services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../Watts2Crypto-front
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:8080"
    restart: unless-stopped

volumes:
  backend-data: