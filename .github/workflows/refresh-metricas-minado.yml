name: Refresh Metricas Minado Data

on:
  schedule:
    - cron: '0 5 * * *'
      timezone: "Europe/Madrid"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-metricas-minado:
    name: Refresh metricas minado data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RENDER_WEB_SERVICE_URL: ${{ vars.RENDER_WEB_SERVICE_URL }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      ENDPOINT: metricas-minado

    steps:
      - uses: actions/checkout@v4

      - name: Run refresh
        shell: bash
        run: bash .github/scripts/refresh-endpoint.sh