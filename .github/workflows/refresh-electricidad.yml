name: Refresh Electricidad Data

on:
  schedule:
    - cron: '0 4 * * *'
      timezone: "Europe/Madrid"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-electricidad:
    name: Refresh electricidad data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RENDER_WEB_SERVICE_URL: ${{ vars.RENDER_WEB_SERVICE_URL }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      ENDPOINT: electricidad

    steps:
      - uses: actions/checkout@v5

      - name: Run refresh
        shell: bash
        run: bash .github/scripts/refresh-endpoint.sh