name: Refresh Fiat Data

name: Refresh Fiat Data

on:
  schedule:
    - cron: '0 3 * * *'
      timezone: "Europe/Madrid"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-fiat:
    name: Refresh fiat data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RENDER_WEB_SERVICE_URL: ${{ vars.RENDER_WEB_SERVICE_URL }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      ENDPOINT: fiat

    steps:
      - uses: actions/checkout@v4

      - name: Run refresh
        shell: bash
        run: bash .github/scripts/refresh-endpoint.sh